@endforeach
      </select>

      <label for="address">Shipping address</label>
      <input id="address" name="address" type="text" placeholder="Street, number, city" />

      <button type="button">Create order</button>
    </div>

    <div class="totals">
      <div>Products subtotal: $<span id="subtotal">{{ $subtotal }}</span></div>
      <div>Total with shipping: $<span id="total">{{ $total }}</span></div>
    </div>
  </div>

  <script>
    (function () {
      const shippingSelect = document.getElementById('shipping');
      const totalElement = document.getElementById('total');
      const subtotalElement = document.getElementById('subtotal');
      const card = document.querySelector('.order-card');

      if (!shippingSelect || !totalElement || !subtotalElement || !card) {
        return;
      }

      const subtotal = Number(card.getAttribute('data-subtotal') || '0');

      function updateTotal() {
        const selected = shippingSelect.options[shippingSelect.selectedIndex];
        const shippingPrice = Number(selected?.getAttribute('data-price') || '0');
        totalElement.textContent = (subtotal + shippingPrice).toFixed(2);
      }

      subtotalElement.textContent = subtotal.toFixed(2);
      shippingSelect.addEventListener('change', updateTotal);
      updateTotal();
    })();
  </script>
</body>
</html>
